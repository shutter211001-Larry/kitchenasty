server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # VitePress generates clean URLs
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }
}
